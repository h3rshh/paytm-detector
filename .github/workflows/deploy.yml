# .github/workflows/deploy.yml
name: Build and Deploy to AWS EC2

on:
  push:
    branches: [ main ]

env:
  AWS_REGION:     ap-south-1
  ECR_REPOSITORY: paytm-detector-large
  IMAGE_TAG:      ${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ubuntu
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            # login to ECR from EC2
            aws ecr get-login-password --region ap-south-1 \
              | docker login --username AWS \
                --password-stdin ${{ steps.login-ecr.outputs.registry }}

            # pull latest image
            docker pull ${{ steps.login-ecr.outputs.registry }}/paytm-detector-large:latest

            # stop old container if running
            docker stop paytm-detector || true
            docker rm   paytm-detector || true

            # start new container
            docker run -d \
              --name paytm-detector \
              --restart unless-stopped \
              -p 8000:8000 \
              ${{ steps.login-ecr.outputs.registry }}/paytm-detector-large:latest

            # verify it started
            sleep 5
            curl -f http://localhost:8000/health || exit 1